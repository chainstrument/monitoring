framework:
    messenger:
        # Après épuisement des tentatives sur "async", le message part sur ce
        # transport plutôt que d'être silencieusement perdu (US-05.3) :
        # consultable via bin/console messenger:failed:show.
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    # Backoff exponentiel borné : 1s, 2s, 4s puis abandon (vers "failed").
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 10000
            failed: 'doctrine://default?queue_name=failed'

        routing:
            App\Application\Probe\ExecuteProbeMessage: async

when@test:
    framework:
        messenger:
            transports:
                # "sync://" exécute le handler immédiatement dans le process courant :
                # pas de worker à lancer pour les tests d'intégration (US-05.1).
                async: 'sync://'
