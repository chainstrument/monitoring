name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: monitoring_test
          POSTGRES_USER: monitoring
          POSTGRES_PASSWORD: monitoring
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U monitoring -d monitoring_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      APP_ENV: test
      DATABASE_URL: "postgresql://monitoring:monitoring@127.0.0.1:5432/monitoring_test?serverVersion=16&charset=utf8"

    steps:
      - uses: actions/checkout@v4

      - name: Install PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: ctype, iconv, intl, pdo_pgsql, zip, opcache
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Lint YAML config
        run: php bin/console lint:yaml config

      - name: Lint container
        run: php bin/console lint:container

      - name: PHPStan
        run: composer phpstan

      - name: PHP-CS-Fixer (dry-run)
        run: composer cs-check

      - name: PHPUnit
        run: bin/phpunit
